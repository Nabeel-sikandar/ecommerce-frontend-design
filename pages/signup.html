<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - NBL Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/footer.css">
</head>
<body>

  <header class="header">
    <div class="header-top container">
      <a href="../index.html" class="header-logo"><img src="../images/brand/logo.png" alt="NBL Store" class="logo-img"></a>
      <div style="flex:1;"></div>
      <nav class="header-icons">
        <a href="login.html" class="header-icon-item"><i class="fa-regular fa-user"></i><span>Login</span></a>
        <a href="cart.html" class="header-icon-item"><i class="fa-solid fa-cart-shopping"></i><span>My cart</span></a>
      </nav>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join NBL Store — start shopping today!</p>

      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Full Name *</label>
          <div class="input-icon">
            <i class="fa-regular fa-user"></i>
            <input type="text" id="signupName" placeholder="Enter your full name" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email *</label>
          <div class="input-icon">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="form-group">
          <label>Phone (optional)</label>
          <div class="input-icon">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="signupPhone" placeholder="+92 3XX XXXXXXX">
          </div>
        </div>

        <div class="form-group">
          <label>Password *</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="toggle-password" onclick="togglePassword(this)"><i class="fa-regular fa-eye"></i></button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password *</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
          </div>
        </div>

        <div class="form-options">
          <label><input type="checkbox" required> I agree to <a href="#">Terms & Conditions</a></label>
        </div>

        <button type="submit" class="auth-btn">Create Account</button>
      </form>

      <div class="auth-divider">or</div>

      <button class="auth-btn google" onclick="alert('Google signup coming soon!')">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Sign up with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 NBL Store.</p>
        <div class="footer-lang"><img src="../images/flags/US@2x.png" alt="" class="flag"><span>English</span></div>
      </div>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
